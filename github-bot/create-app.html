<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Security Audit Bot</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; line-height: 1.6; max-width: 600px; margin: 40px auto; padding: 20px; color: #24292e; }
        .card { border: 1px solid #e1e4e8; border-radius: 6px; padding: 24px; background: #fff; box-shadow: 0 1px 3px rgba(27,31,35,0.12); }
        h1 { font-size: 24px; margin-top: 0; }
        p { color: #586069; }
        button { background-color: #2ea44f; color: white; border: 1px solid rgba(27,31,35,0.15); border-radius: 6px; padding: 12px 20px; font-size: 16px; font-weight: 600; cursor: pointer; display: block; width: 100%; }
        button:hover { background-color: #2c974b; }
        pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow: auto; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create Security Audit Bot</h1>
        <p>Clicking the button below will take you to GitHub to create a new App with the exact permissions and events required for the Security Review Bot.</p>
        
        <form action="https://github.com/settings/apps/new" method="post">
            <input type="hidden" name="manifest" id="manifest">
            <button type="submit">Create GitHub App</button>
        </form>

        <p><small>You will be able to review the settings before finalizing on GitHub.</small></p>
    </div>

    <script>
        const manifest = {
            "name": "Security Audit Bot-" + Math.floor(Math.random() * 1000),
            "url": "https://github.com/sapientcoffee/security-agent",
            "hook_attributes": {
                "url": "https://github-security-bot-300502296392.us-central1.run.app/api/webhook"
            },
            "redirect_url": "https://github-security-bot-300502296392.us-central1.run.app/setup-callback",
            "public": false,
            "default_permissions": {
                "pull_requests": "write",
                "contents": "read",
                "metadata": "read"
            },
            "default_events": [
                "pull_request"
            ]
        };
        document.getElementById('manifest').value = JSON.stringify(manifest);
    </script>
</body>
</html>
